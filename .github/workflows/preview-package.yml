name: Preview package

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  publish-preview:
    name: Publish PR preview package
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Set preview version
        id: preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const baseVersion = String(pkg.version).split("-")[0];
          const shortSha = process.env.GITHUB_SHA.slice(0, 12).replace(/[^0-9A-Za-z-]/g, "");
          const version = `${baseVersion}-pr.${process.env.PR_NUMBER}.${shortSha}.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_RUN_ATTEMPT}`;
          pkg.version = version;
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          const tag = `pr-${process.env.PR_NUMBER}`;
          const packageUrl = `https://www.npmjs.com/package/${pkg.name}/v/${version}`;
          console.log(`package_name=${pkg.name}`);
          console.log(`version=${version}`);
          console.log(`tag=${tag}`);
          console.log(`package_ref=${pkg.name}@${version}`);
          console.log(`tag_ref=${pkg.name}@${tag}`);
          console.log(`package_url=${packageUrl}`);
          NODE

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish preview package
        run: npm publish --provenance --access public --tag "${{ steps.preview.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify preview package
        run: npm view "${{ steps.preview.outputs.package_ref }}" version

      - name: Comment package preview
        uses: actions/github-script@v7
        env:
          PACKAGE_NAME: ${{ steps.preview.outputs.package_name }}
          PACKAGE_REF: ${{ steps.preview.outputs.package_ref }}
          TAG_REF: ${{ steps.preview.outputs.tag_ref }}
          TAG: ${{ steps.preview.outputs.tag }}
          PACKAGE_URL: ${{ steps.preview.outputs.package_url }}
        with:
          script: |
            const marker = `<!-- emcy-preview-package:${process.env.PACKAGE_NAME} -->`;
            const manifestSnippet = JSON.stringify({ [process.env.PACKAGE_NAME]: process.env.TAG_REF }, null, 2);
            const body = [
              marker,
              "Preview package published.",
              "",
              `- Package: [${process.env.PACKAGE_REF}](${process.env.PACKAGE_URL})`,
              `- Dist tag: \`${process.env.TAG}\``,
              `- Install: \`npm i ${process.env.TAG_REF}\``,
              "",
              "To use this in an `emcy-saas` PR preview, paste this into `infra/preview-packages.json` in the `emcy-saas` PR:",
              "",
              "```json",
              manifestSnippet,
              "```",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  remove-preview-tag:
    name: Remove PR preview dist-tag
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Remove dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          TAG="pr-${PR_NUMBER}"
          npm dist-tag rm "$PACKAGE_NAME" "$TAG" || true
